<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project O - Chat</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="chat-page">
  <main class="chat-screen" aria-label="Local context chat screen">
    <header class="chat-header">
      <a class="chat-back" href="./index.html" aria-label="Back to camera">
        <img src="https://www.figma.com/api/mcp/asset/7c893e7b-0c57-4ad2-88bd-955a325eb1e5" alt="" aria-hidden="true" />
        <span>Chat</span>
      </a>
    </header>

    <section id="chatMessages" class="chat-messages" aria-live="polite"></section>

    <form id="chatForm" class="chat-form" autocomplete="off">
      <label class="sr-only" for="chatInput">Ask about local weather</label>
      <input
        id="chatInput"
        class="chat-input"
        type="text"
        maxlength="500"
        placeholder="Start typing here"
        required
      />
      <button id="chatSend" class="chat-send" type="submit" aria-label="Send message">
        <img src="https://www.figma.com/api/mcp/asset/ce4f3ebb-6be7-4bb6-afb7-8fd7fcb438fe" alt="" aria-hidden="true" />
      </button>
    </form>
  </main>

  <script src="./chat.js"></script>
</body>
</html>
