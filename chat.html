<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project O - Chat</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="chat-screen" aria-label="Local context chat screen">
    <header class="chat-header">
      <a class="chat-back" href="./index.html" aria-label="Back to camera">
        <span aria-hidden="true">&larr;</span>
        <span>Back</span>
      </a>
      <p id="locationStatus" class="location-status">Detecting location...</p>
    </header>

    <section id="chatMessages" class="chat-messages" aria-live="polite"></section>

    <form id="chatForm" class="chat-form" autocomplete="off">
      <label class="sr-only" for="chatInput">Ask about local weather and news</label>
      <input
        id="chatInput"
        class="chat-input"
        type="text"
        maxlength="500"
        placeholder="Ask about weather, local updates, or anything else..."
        required
      />
      <button id="chatSend" class="chat-send" type="submit">Send</button>
    </form>
  </main>

  <script src="./chat.js"></script>
</body>
</html>
